name = "reference"
description = "Reference-oriented suite with exact PSD baselines for small synthetic and OpenML datasets."
output_dir = "results/reference"
methods = ["rp_cholesky", "column_norm_cholesky", "projected_rp_cholesky", "projected_column_norm_cholesky"]
ranks = [200, 400, 600, 800]
seeds = [0]

[reference]
enabled = true

[[datasets]]
kind = "openml"
name = "yolanda"
dataset = "yolanda"
n_samples = 10000
seed = 0
standardize = true
